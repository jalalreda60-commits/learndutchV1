build-preview:
  name: EAS Build Preview APK
  runs-on: ubuntu-latest
  timeout-minutes: 60
  needs: ci

  if: |
    (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
    (github.event_name == 'workflow_dispatch' && github.event.inputs.run_build == 'true')

  env:
    PLATFORM: ${{ github.event.inputs.platform }}
    BUILD_PROFILE: ${{ github.event.inputs.build_profile }}

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.19.0

    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package.json') }}
        restore-keys: |
          node-modules-${{ runner.os }}-

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm install --legacy-peer-deps --no-audit

    - name: Setup EAS
      uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    - name: Inject google-services.json
      env:
        GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      run: |
        if [ -n "$GOOGLE_SERVICES_B64" ]; then
          echo "$GOOGLE_SERVICES_B64" | base64 --decode > google-services.json
          echo "google-services.json created"
        else
          echo "No GOOGLE_SERVICES_JSON_BASE64 secret found"
        fi

    - name: Create .env file
      run: |
        cat > .env << EOF
        APP_ENV=preview
        EXPO_PUBLIC_APP_ENV=preview
        EXPO_PUBLIC_ANTHROPIC_KEY=${{ secrets.ANTHROPIC_API_KEY }}
        EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
        EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
        EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
        EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
        EOF

    - name: Resolve build settings
      run: |
        if [ -z "$PLATFORM" ]; then
          echo "PLATFORM=android" >> $GITHUB_ENV
        fi

        if [ -z "$BUILD_PROFILE" ]; then
          echo "BUILD_PROFILE=preview" >> $GITHUB_ENV
        fi

    - name: Run EAS Build
      run: |
        echo "Platform: ${PLATFORM:-android}"
        echo "Profile: ${BUILD_PROFILE:-preview}"

        eas build \
          --platform ${PLATFORM:-android} \
          --profile ${BUILD_PROFILE:-preview} \
          --non-interactive \
          --no-wait

    - name: Write summary
      run: |
        echo "## EAS Build Queued" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Profile | ${BUILD_PROFILE:-preview} |" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | ${PLATFORM:-android} |" >> $GITHUB_STEP_SUMMARY
        echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
